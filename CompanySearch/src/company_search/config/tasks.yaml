research_task:
  description: >
    Search the internet for information about the company "{company_name}".
    Your goal is to gather:
    1. What the company does — business model, main products or services, industry sector.
    2. Key facts — founding year, headquarters, size, or notable milestones.
    3. Latest news — at least 3 to 5 recent news items from the past few weeks or months,
       including dates and sources whenever possible.
    Use multiple searches to cover both the company overview and recent developments.
  expected_output: >
    A structured report with two clearly labeled sections:
    - "Company Overview": what {company_name} does, their business model, and key facts.
    - "Latest News": 3 to 5 recent news items with dates, brief descriptions, and sources.
  agent: company_researcher

summary_task:
  description: >
    Using the research provided about "{company_name}", produce a structured JSON summary.
    The JSON must have exactly these fields:
    - company_name: the exact name of the company (string)
    - about: 2-3 sentences describing what the company does, its business model, and key facts (string)
    - news: an array of 3-5 news items, each with:
        - date: the date of the news (string, e.g. "2025-01-15" or "January 2025")
        - headline: a short, informative headline (string)
        - description: 1-2 sentences summarising the news item (string)
        - source: the publication or URL where the news was found (string, can be empty)
    Output ONLY the raw JSON object — no markdown fences, no extra text.
  expected_output: >
    A valid JSON object matching this exact structure (no markdown, no code fences):
    {
      "company_name": "string",
      "about": "2-3 sentence overview of the company",
      "news": [
        {
          "date": "YYYY-MM-DD or descriptive date",
          "headline": "short headline",
          "description": "1-2 sentence description",
          "source": "publication name or URL"
        }
      ]
    }
  agent: company_summarizer
  context:
    - research_task
